<!DOCTYPE html>
<html lang="en">
<head>
    <!--

      Internet Technology Assignment

       -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Veronia">
    <meta name="description" content="Contact page for course organizer">
    <title>Contact - Personal Course Organizer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">📚 Personal Courses Organizer</h1>
            <nav aria-label="Main Navigation">
                <ul>
                    <li><a href="index.html">🏠 Home</a></li>
                    <li><a href="courses.html">📋 My Courses</a></li>
                    <li><a href="add-course.html">➕ Add Course</a></li>
                    <li><a href="contact.html" class="active">📧 Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h2>📩 Get in Touch</h2>
                <p class="subtitle">Send a message for inquiries or feedback</p>
            </div>
        </section>

        <section class="contact-content">
            <div class="container">
                <div class="contact-grid">

                    <div class="contact-form">
                        <form>
                            <div class="form-group">
                                <label for="name">Your Name *</label>
                                <input type="text" id="name" name="name" required>
                            </div>

                            <div class="form-group">
                                <label for="email">Your Email *</label>
                                <input type="email" id="email" name="email" required>
                            </div>

                            <div class="form-group">
                                <label for="message">Your Message *</label>
                                <textarea id="message" name="message" rows="5"
                                    placeholder="Write your message or feedback here..."></textarea>
                            </div>

                            <button type="submit" class="submit-btn">Send Message 🚀</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Personal Courses Organizer 💻 | Internet Technology Project</p>
        </div>
    </footer>
</body>
</html>
